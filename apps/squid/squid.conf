# Minimal squid.conf for running as a forward proxy inside OpenShift.
# Memory-only cache (no cache_dir), logs to stdout/stderr, no pid file.

# Cluster-internal clients (pod/service networks are RFC1918 in this lab)
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Deny requests to unsafe ports, and CONNECT to non-TLS ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Cache manager only from localhost
http_access allow localhost manager
http_access deny manager

http_access allow localnet
http_access allow localhost
http_access deny all

http_port 3128

# Container-friendly runtime: foreground process, no pid file, logs to the
# container runtime (cache/debug output reaches stderr via `-d 1`)
pid_filename none
access_log stdio:/dev/stdout
cache_log /dev/null
logfile_rotate 0
coredump_dir /var/spool/squid

# Fast, clean pod shutdown on SIGTERM
shutdown_lifetime 5 seconds
